x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
  AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
  PYTHONPATH: /opt/recsys/src
  RECSYS_MLFLOW_TRACKING_URI: ${RECSYS_MLFLOW_TRACKING_URI}
  RECSYS_MLFLOW_EXPERIMENT: ${RECSYS_MLFLOW_EXPERIMENT}
  RECSYS_PARAMS_FILE: ${RECSYS_PARAMS_FILE}
  OPENBLAS_NUM_THREADS: "1"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    <<: *airflow-env
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./src:/opt/recsys/src:ro
    - ./data:/opt/recsys/data
    - ./artifacts:/opt/recsys/artifacts
    - ./params.yaml:/opt/recsys/params.yaml:ro
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file:/mlflow/mlruns
      --artifacts-destination /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-runs:/mlflow/mlruns
      - mlflow-artifacts:/mlflow/artifacts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: db migrate
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
      _AIRFLOW_WWW_USER_CREATE: ${_AIRFLOW_WWW_USER_CREATE}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      _AIRFLOW_WWW_USER_EMAIL: ${_AIRFLOW_WWW_USER_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  recsys-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: /opt/recsys/src
      RECSYS_MLFLOW_TRACKING_URI: ${RECSYS_MLFLOW_TRACKING_URI}
      RECSYS_MLFLOW_EXPERIMENT: ${RECSYS_MLFLOW_EXPERIMENT}
      RECSYS_API_HOST: ${RECSYS_API_HOST}
      RECSYS_API_PORT: ${RECSYS_API_PORT}
      RECSYS_PARAMS_FILE: ${RECSYS_PARAMS_FILE}
      OPENBLAS_NUM_THREADS: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/opt/recsys/artifacts
      - ./data:/opt/recsys/data
      - ./params.yaml:/opt/recsys/params.yaml:ro
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      recsys-api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-logs:
  mlflow-runs:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:
